<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ControlZ - Calculadora de Pedidos</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0096c7">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ControlZ">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(6px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        .msg-anim { animation: fadeIn 0.2s ease; }

        @keyframes savedPulse {
          0%   { opacity: 0; transform: scale(0.92); }
          20%  { opacity: 1; transform: scale(1); }
          80%  { opacity: 1; }
          100% { opacity: 0; }
        }
        .saved-toast { animation: savedPulse 1.8s ease forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const POR_KM     = 257;
        const POR_SKU    = 100;
        const SKU_MINIMO = 5;
        const IMPUESTO   = 0.1525;
        const MULTI_FACTOR = 0.75;

        // ─── Utilidades de fecha LOCAL (evita bug UTC) ───────────────────────
        // Siempre usamos año/mes/día local del dispositivo, nunca toISOString()
        // porque toISOString() devuelve UTC y en Chile (UTC-3/UTC-4) las 21:00
        // del domingo ya son lunes en UTC → bug reportado.
        function getLocalDateStr(date = new Date()) {
          const y = date.getFullYear();
          const m = String(date.getMonth() + 1).padStart(2, "0");
          const d = String(date.getDate()).padStart(2, "0");
          return `${y}-${m}-${d}`;
        }

        function getTodayKey() {
          return getLocalDateStr(new Date());
        }

        function getLunesKey(dateStr) {
          // Usamos T12:00:00 sin zona para que el parser la trate como LOCAL
          const d = new Date(dateStr + "T12:00:00");
          const day = d.getDay();
          const diff = day === 0 ? -6 : 1 - day;
          const lunes = new Date(d);
          lunes.setDate(d.getDate() + diff);
          return getLocalDateStr(lunes);
        }

        function getDomingoKey(lunesStr) {
          const d = new Date(lunesStr + "T12:00:00");
          d.setDate(d.getDate() + 6);
          return getLocalDateStr(d);
        }

        function formatFecha(dateStr) {
          const [y, m, d] = dateStr.split("-");
          return `${d}/${m}/${y}`;
        }
        // ────────────────────────────────────────────────────────────────────

        function neto(bruto) { return bruto * (1 - IMPUESTO); }

        function getTarifaBase(date = new Date()) {
          const dia = date.getDay();
          const esFinDeSemana = dia === 0 || dia === 6;
          const hora = date.getHours() + date.getMinutes() / 60;
          let base;
          if      (hora >= 6  && hora < 9)  base = esFinDeSemana ? 2700 : 2600;
          else if (hora >= 9  && hora < 15) base = esFinDeSemana ? 2500 : 2400;
          else if (hora >= 15 && hora < 18) base = esFinDeSemana ? 2500 : 2400;
          else if (hora >= 18 && hora <= 22)base = esFinDeSemana ? 3300 : 3100;
          else                              base = esFinDeSemana ? 2500 : 2400;
          return { base, esFinDeSemana };
        }

        // ─── Tramo activo detectado por hora, no por comparación de base ────
        // Antes: comparaba base === lv/sd → falso positivo cuando dos tramos tienen mismo precio.
        // Ahora: identifica el tramo por hora, igual que getTramoLabel.
        function getTramoIdx(date = new Date()) {
          const hora = date.getHours() + date.getMinutes() / 60;
          if (hora >= 6  && hora < 9)  return 0;
          if (hora >= 9  && hora < 15) return 1;
          if (hora >= 15 && hora < 18) return 2;
          if (hora >= 18 && hora <= 22)return 3;
          return -1; // fuera de horario
        }

        function getTramoLabel(date = new Date()) {
          const idx = getTramoIdx(date);
          const labels = ["6:00 – 8:59 hs","9:00 – 14:59 hs","15:00 – 17:59 hs","18:00 – 22:00 hs"];
          return idx >= 0 ? labels[idx] : "Fuera de horario";
        }

        function calcularPedido(skus, km, base) {
          return base + Math.max(0, skus - SKU_MINIMO) * POR_SKU + km * POR_KM;
        }

        function formatCLP(n) {
          return "$" + Math.round(n).toLocaleString("es-CL");
        }

        const DIAS_NOMBRE = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
        const DIAS_FULL   = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];

        const TARIFAS = [
          ["6–8:59",   2600, 2700],
          ["9–14:59",  2400, 2500],
          ["15–17:59", 2400, 2500],
          ["18–22",    3100, 3300],
        ];

        // ─── Hook para mensajes en cola (evita que msg2 borre a msg1) ────────
        function useMsgQueue() {
          const [msg, setMsg] = useState("");
          const timerRef = useRef(null);
          const showMsg = (text, ms = 2000) => {
            if (timerRef.current) clearTimeout(timerRef.current);
            setMsg(text);
            timerRef.current = setTimeout(() => setMsg(""), ms);
          };
          return [msg, showMsg];
        }

        // ─── SubPedidoRow ─────────────────────────────────────────────────────
        function SubPedidoRow({ idx, data, onChange, onRemove, baseUsada, tramoColor, esUltimo }) {
          const skusN    = parseInt(data.skus) || 0;
          const kmN      = parseFloat(data.km) || 0;
          const retornoN = parseFloat(data.retorno) || 0;
          const kmTotal  = esUltimo ? kmN + retornoN : kmN;
          const tieneData = data.skus && (data.km !== "" || (esUltimo && data.retorno !== ""));
          const bruto = tieneData ? calcularPedido(skusN, kmTotal, baseUsada) : null;

          return (
            <div style={{ background:"rgba(255,255,255,0.04)", borderRadius:10, padding:"10px 12px", border:"1px solid rgba(251,191,36,0.15)", marginBottom:8 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:7 }}>
                <span style={{ fontSize:11, color:"#fbbf24", fontWeight:700 }}>
                  {idx === 0 ? `Pedido #1 · Base ${formatCLP(baseUsada)}` : `Pedido #${idx+1} · Base ${formatCLP(baseUsada)} (75%)`}
                  {esUltimo && <span style={{ color:"#a0aec0", fontWeight:400, marginLeft:5 }}>· último</span>}
                </span>
                {idx >= 2 && (
                  <button onClick={onRemove} style={{ background:"none", border:"none", color:"#fc8181", cursor:"pointer", fontSize:14 }}>✕</button>
                )}
              </div>
              <div style={{ display:"flex", gap:8, marginBottom: esUltimo ? 6 : 0 }}>
                <div style={{ flex:1 }}>
                  <label style={{ fontSize:10, color:"#a0aec0", display:"block", marginBottom:3 }}>SKUs</label>
                  <input type="number" value={data.skus} onChange={e => onChange("skus", e.target.value)}
                    placeholder="Ej: 10" step="1" min="0"
                    style={{ width:"100%", padding:"9px 10px", borderRadius:7, border:"1px solid #1f2937", background:"#0d1117", color:"#e2e8f0", fontSize:15, boxSizing:"border-box" }} />
                </div>
                {esUltimo ? (
                  <div style={{ flex:1, display:"flex", gap:5 }}>
                    <div style={{ flex:1 }}>
                      <label style={{ fontSize:10, color:"#a0aec0", display:"block", marginBottom:3 }}>Kilómetros</label>
                      <input type="number" value={data.km} onChange={e => onChange("km", e.target.value)}
                        placeholder="0" step="0.1" min="0"
                        style={{ width:"100%", padding:"9px 8px", borderRadius:7, border:"1px solid #1f2937", background:"#0d1117", color:"#e2e8f0", fontSize:14, boxSizing:"border-box" }} />
                    </div>
                    <div style={{ display:"flex", alignItems:"flex-end", paddingBottom:9, color:"#4a5568", fontSize:13 }}>+</div>
                    <div style={{ flex:1 }}>
                      <label style={{ fontSize:10, color:"#60a5fa", display:"block", marginBottom:3 }}>Retorno</label>
                      <input type="number" value={data.retorno || ""} onChange={e => onChange("retorno", e.target.value)}
                        placeholder="0" step="0.1" min="0"
                        style={{ width:"100%", padding:"9px 8px", borderRadius:7, border:"1px solid #1e3a5f", background:"#0a1628", color:"#90cdf4", fontSize:14, boxSizing:"border-box" }} />
                    </div>
                  </div>
                ) : (
                  <div style={{ flex:1 }}>
                    <label style={{ fontSize:10, color:"#a0aec0", display:"block", marginBottom:3 }}>Kilómetros</label>
                    <input type="number" value={data.km} onChange={e => onChange("km", e.target.value)}
                      placeholder="Ej: 2.5" step="0.1" min="0"
                      style={{ width:"100%", padding:"9px 10px", borderRadius:7, border:"1px solid #1f2937", background:"#0d1117", color:"#e2e8f0", fontSize:15, boxSizing:"border-box" }} />
                  </div>
                )}
              </div>
              {esUltimo && (kmN > 0 || retornoN > 0) && (
                <div style={{ fontSize:10, color:"#4a5568", marginBottom:4, textAlign:"right" }}>
                  km total: {kmN.toFixed(1)} + {retornoN.toFixed(1)} = <span style={{ color:"#90cdf4" }}>{kmTotal.toFixed(1)} km</span>
                </div>
              )}
              {bruto !== null && (
                <div style={{ marginTop:4, fontSize:11, color:"#718096", display:"flex", justifyContent:"space-between" }}>
                  <span>Bruto: {formatCLP(bruto)}</span>
                  <span style={{ fontWeight:700, color:tramoColor }}>Neto: {formatCLP(neto(bruto))}</span>
                </div>
              )}
            </div>
          );
        }

        // ─── Modal de edición ────────────────────────────────────────────────
        function EditModal({ pedido, idx, onSave, onClose, tramoColor }) {
          const [skus, setSkus] = useState(String(pedido.skus));
          const [km,   setKm]   = useState(String(pedido.km));

          const skusN = parseInt(skus) || 0;
          const kmN   = parseFloat(km) || 0;
          const brutoPreview = skus && km !== "" ? calcularPedido(skusN, kmN, pedido.base) : null;

          const handleSave = () => {
            const s = parseInt(skus), k = parseFloat(km);
            if (!s || s < 1 || isNaN(k) || k < 0) return;
            const bruto = calcularPedido(s, k, pedido.base);
            onSave(idx, { ...pedido, skus: s, km: k, bruto, total: neto(bruto) });
          };

          return (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.82)", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
              <div style={{ background:"#0d1b2e", borderRadius:16, padding:"22px 18px", border:"1px solid rgba(0,150,199,0.35)", maxWidth:340, width:"100%" }}>
                <div style={{ fontSize:14, fontWeight:800, color:"#90cdf4", marginBottom:14 }}>✏️ Editar Pedido #{idx+1}</div>
                <div style={{ fontSize:10, color:"#4a5568", marginBottom:12 }}>
                  Base original: {formatCLP(pedido.base)} · {pedido.hora}
                  {pedido.esMulti && <span style={{ color:"#fbbf24", marginLeft:6 }}>🔀 Multiorden</span>}
                </div>
                <div style={{ display:"flex", gap:10, marginBottom:12 }}>
                  <div style={{ flex:1 }}>
                    <label style={{ fontSize:10, color:"#a0aec0", display:"block", marginBottom:4 }}>SKUs</label>
                    <input type="number" value={skus} onChange={e => setSkus(e.target.value)} placeholder="Ej: 12" step="1" min="1"
                      style={{ width:"100%", padding:"9px 10px", borderRadius:7, border:"1px solid #1f2937", background:"#0d1117", color:"#e2e8f0", fontSize:15, boxSizing:"border-box" }} />
                  </div>
                  <div style={{ flex:1 }}>
                    <label style={{ fontSize:10, color:"#a0aec0", display:"block", marginBottom:4 }}>Kilómetros</label>
                    <input type="number" value={km} onChange={e => setKm(e.target.value)} placeholder="Ej: 3.5" step="0.1" min="0"
                      style={{ width:"100%", padding:"9px 10px", borderRadius:7, border:"1px solid #1f2937", background:"#0d1117", color:"#e2e8f0", fontSize:15, boxSizing:"border-box" }} />
                  </div>
                </div>
                {brutoPreview !== null && (
                  <div style={{ background:"rgba(0,150,199,0.07)", borderRadius:8, padding:"9px 12px", marginBottom:14, fontSize:11, color:"#90cdf4", border:"1px solid rgba(0,150,199,0.18)" }}>
                    Bruto: {formatCLP(brutoPreview)} → <span style={{ fontWeight:800, color:tramoColor, fontSize:14 }}>Neto: {formatCLP(neto(brutoPreview))}</span>
                  </div>
                )}
                <div style={{ display:"flex", gap:10 }}>
                  <button onClick={onClose} style={{ flex:1, padding:"11px", borderRadius:9, background:"rgba(255,255,255,0.05)", border:"1px solid #1f2937", color:"#a0aec0", fontWeight:600, cursor:"pointer" }}>Cancelar</button>
                  <button onClick={handleSave} style={{ flex:1, padding:"11px", borderRadius:9, background:"linear-gradient(90deg,#005f99,#0096c7)", border:"none", color:"white", fontWeight:700, cursor:"pointer" }}>Guardar</button>
                </div>
              </div>
            </div>
          );
        }

        // ─── App ──────────────────────────────────────────────────────────────
        function App() {
          const [pedidos, setPedidos]       = useState([]);
          const [skus, setSkus]             = useState("");
          const [km, setKm]                 = useState("");
          const [tab, setTab]               = useState("hoy");
          const [historial, setHistorial]   = useState({});
          const [ahora, setAhora]           = useState(new Date());
          const [showMulti, setShowMulti]   = useState(false);
          const [subPedidos, setSubPedidos] = useState([{ skus:"", km:"", retorno:"" }, { skus:"", km:"", retorno:"" }]);
          const [confirmDelete, setConfirmDelete] = useState(null);
          const [confirmStep, setConfirmStep]     = useState(0);
          const [semanasAbiertas, setSemanasAbiertas] = useState({});
          const [editando, setEditando]     = useState(null); // { pedido, idx }
          const [savedVisible, setSavedVisible] = useState(false);
          const savedTimerRef = useRef(null);
          const [confirmPedidoIdx, setConfirmPedidoIdx] = useState(null); // índice del pedido en espera de 2ª confirmación
          const confirmPedidoTimerRef = useRef(null);

          // Reloj — actualiza cada minuto
          useEffect(() => {
            const t = setInterval(() => setAhora(new Date()), 60000);
            return () => clearInterval(t);
          }, []);

          // Carga inicial desde localStorage
          useEffect(() => {
            try {
              const hist = JSON.parse(localStorage.getItem("zubale_hist") || "{}");
              setHistorial(hist);
              // ✅ FIX: usa fecha LOCAL, no toISOString()
              setPedidos(hist[getTodayKey()] || []);
            } catch {}
          }, []);

          // Persistencia — guarda en localStorage cuando cambian los pedidos
          // ✅ FIX: también actualiza localStorage explícitamente para el día de hoy,
          //         no depende de que el useEffect relea todo el historial.
          useEffect(() => {
            try {
              const hoy = getTodayKey(); // ← fecha local
              const hist = JSON.parse(localStorage.getItem("zubale_hist") || "{}");
              if (pedidos.length === 0) {
                // Si vaciamos hoy, borramos la clave para no dejar array vacío
                delete hist[hoy];
              } else {
                hist[hoy] = pedidos;
              }
              localStorage.setItem("zubale_hist", JSON.stringify(hist));
              setHistorial({ ...hist });

              // Toast de guardado
              if (savedTimerRef.current) clearTimeout(savedTimerRef.current);
              setSavedVisible(true);
              savedTimerRef.current = setTimeout(() => setSavedVisible(false), 1800);
            } catch {}
          }, [pedidos]);

          // ─── Tarifa y display ───────────────────────────────────────────────
          const { base, esFinDeSemana } = getTarifaBase(ahora);
          const baseMulti  = Math.round(base * MULTI_FACTOR);
          const tramo      = getTramoLabel(ahora);
          const tramoIdx   = getTramoIdx(ahora);  // ✅ FIX: índice real del tramo
          const horaLabel  = ahora.toLocaleTimeString("es-CL", { hour:"2-digit", minute:"2-digit" });
          const diaLabel   = DIAS_NOMBRE[ahora.getDay()];
          const tramoColor = ahora.getHours() >= 18 ? "#f6c90e"
            : ahora.getHours() < 9 ? "#68d391" : "#90cdf4";

          // ─── useMemo para historial agrupado por semanas ────────────────────
          // ✅ FIX: se recalcula solo cuando historial cambia, no en cada render
          const { diasConPedidos, semanas, semanasKeys } = useMemo(() => {
            const dias = Object.keys(historial)
              .filter(d => (historial[d] || []).length > 0)
              .sort().reverse();
            const sem = {};
            dias.forEach(dia => {
              const lunes = getLunesKey(dia);
              if (!sem[lunes]) sem[lunes] = [];
              sem[lunes].push(dia);
            });
            return {
              diasConPedidos: dias,
              semanas: sem,
              semanasKeys: Object.keys(sem).sort().reverse()
            };
          }, [historial]);

          // ─── Msg con cola (evita que el 2do mensaje borre al 1ro) ───────────
          const [msg, showMsg] = useMsgQueue();

          const skusN  = parseInt(skus) || 0;
          const kmN    = parseFloat(km) || 0;
          const preview = skus && km !== "" && !isNaN(kmN);

          // ─── Agregar pedido ─────────────────────────────────────────────────
          const agregarPedido = () => {
            const s = parseInt(skus), k = parseFloat(km);
            if (!s || s < 1 || isNaN(k) || k < 0) {
              showMsg("⚠️ Ingresa SKUs y km válidos", 2000); return;
            }
            const now = new Date();
            const { base: b } = getTarifaBase(now);
            const bruto = calcularPedido(s, k, b);
            setPedidos(p => [...p, {
              skus: s, km: k, total: neto(bruto), bruto, base: b, esMulti: false,
              hora: now.toLocaleTimeString("es-CL", { hour:"2-digit", minute:"2-digit" })
            }]);
            setSkus(""); setKm("");
            showMsg("✅ Pedido agregado", 1500);
          };

          // ─── Eliminar pedido individual (doble confirmación inline) ─────────
          const pedirEliminarPedido = (idx) => {
            // Si ya estaba pendiente otro, lo cancelamos primero
            if (confirmPedidoTimerRef.current) clearTimeout(confirmPedidoTimerRef.current);
            setConfirmPedidoIdx(idx);
            // Auto-cancela tras 4 segundos si el usuario no confirma
            confirmPedidoTimerRef.current = setTimeout(() => setConfirmPedidoIdx(null), 4000);
          };
          const confirmarEliminarPedido = (idx) => {
            if (confirmPedidoTimerRef.current) clearTimeout(confirmPedidoTimerRef.current);
            setConfirmPedidoIdx(null);
            setPedidos(prev => prev.filter((_, i) => i !== idx));
            showMsg("🗑 Pedido eliminado", 1500);
          };
          const cancelarEliminarPedido = () => {
            if (confirmPedidoTimerRef.current) clearTimeout(confirmPedidoTimerRef.current);
            setConfirmPedidoIdx(null);
          };

          // ─── Editar pedido ──────────────────────────────────────────────────
          const guardarEdicion = (idx, pedidoEditado) => {
            setPedidos(prev => prev.map((p, i) => i === idx ? pedidoEditado : p));
            setEditando(null);
            showMsg("✅ Pedido editado", 1500);
          };

          // ─── Multiorden ─────────────────────────────────────────────────────
          const updateSub = (i, field, val) =>
            setSubPedidos(prev => prev.map((p, idx) => idx === i ? { ...p, [field]: val } : p));
          const addSub    = () => setSubPedidos(prev => [...prev, { skus:"", km:"", retorno:"" }]);
          const removeSub = (i) => setSubPedidos(prev => prev.filter((_, idx) => idx !== i));

          const confirmarMultiorden = () => {
            const now = new Date();
            const { base: b } = getTarifaBase(now);
            const baseM = Math.round(b * MULTI_FACTOR);
            const hora  = now.toLocaleTimeString("es-CL", { hour:"2-digit", minute:"2-digit" });
            const nuevos = [];
            for (let i = 0; i < subPedidos.length; i++) {
              const s = parseInt(subPedidos[i].skus);
              const k = parseFloat(subPedidos[i].km) || 0;
              const r = parseFloat(subPedidos[i].retorno) || 0;
              const esUltimo = i === subPedidos.length - 1;
              const kmTotal = esUltimo ? k + r : k;
              if (!s || s < 1 || isNaN(kmTotal) || kmTotal < 0) {
                showMsg("⚠️ Completa todos los sub-pedidos", 2500); return;
              }
              const baseUsada = i === 0 ? b : baseM;
              const bruto = calcularPedido(s, kmTotal, baseUsada);
              nuevos.push({
                skus: s, km: kmTotal, kmEntrega: k, retorno: esUltimo ? r : 0,
                total: neto(bruto), bruto, base: baseUsada,
                esMulti: true, multiIdx: i, hora
              });
            }
            setPedidos(p => [...p, ...nuevos]);
            setSubPedidos([{ skus:"", km:"", retorno:"" }, { skus:"", km:"", retorno:"" }]);
            setShowMulti(false);
            showMsg(`✅ Multiorden de ${nuevos.length} pedidos agregada`, 2000);
          };

          // ─── Eliminar día ───────────────────────────────────────────────────
          const pedirEliminarDia = (dateStr) => { setConfirmDelete(dateStr); setConfirmStep(1); };
          const confirmarEliminar1 = () => setConfirmStep(2);
          const confirmarEliminar2 = () => {
            const hoy = getTodayKey();
            if (confirmDelete === hoy) {
              // ✅ FIX: setPedidos([]) dispara el useEffect que limpia localStorage explícitamente
              setPedidos([]);
            } else {
              const hist = { ...historial };
              delete hist[confirmDelete];
              localStorage.setItem("zubale_hist", JSON.stringify(hist));
              setHistorial(hist);
            }
            setConfirmDelete(null);
            setConfirmStep(0);
          };
          const cancelarEliminar = () => { setConfirmDelete(null); setConfirmStep(0); };

          const toggleSemana = (lunes) =>
            setSemanasAbiertas(prev => ({ ...prev, [lunes]: !prev[lunes] }));

          const totalDia = pedidos.reduce((a, p) => a + p.total, 0);
          const brutoDia = pedidos.reduce((a, p) => a + (p.bruto || p.total), 0);

          const multiTotBruto = subPedidos.reduce((acc, sp, i) => {
            const s = parseInt(sp.skus) || 0;
            const k = parseFloat(sp.km) || 0;
            const r = parseFloat(sp.retorno) || 0;
            const esUltimo = i === subPedidos.length - 1;
            const kmTotal = esUltimo ? k + r : k;
            if (!s) return acc;
            return acc + calcularPedido(s, kmTotal, i === 0 ? base : baseMulti);
          }, 0);

          // ─── Render ─────────────────────────────────────────────────────────
          return (
