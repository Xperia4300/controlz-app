<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ControlZ - Calculadora de Pedidos</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        /* Reset para inputs de tipo número para evitar flechas extrañas en móviles */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const POR_KM = 257;
        const POR_SKU = 100;
        const SKU_MINIMO = 5;
        const IMPUESTO = 0.1525;
        const MULTI_FACTOR = 0.75;

        function neto(bruto) { return bruto * (1 - IMPUESTO); }

        function getTarifaBase(date = new Date()) {
          const dia = date.getDay();
          const esFinDeSemana = dia === 0 || dia === 6;
          const hora = date.getHours() + date.getMinutes() / 60;
          let base;
          if (hora >= 6 && hora < 9)         base = esFinDeSemana ? 2700 : 2600;
          else if (hora >= 9 && hora < 15)   base = esFinDeSemana ? 2500 : 2400;
          else if (hora >= 15 && hora < 18)  base = esFinDeSemana ? 2500 : 2400;
          else if (hora >= 18 && hora <= 22) base = esFinDeSemana ? 3300 : 3100;
          else                               base = esFinDeSemana ? 2500 : 2400;
          return { base, esFinDeSemana };
        }

        function getTramoLabel(date = new Date()) {
          const hora = date.getHours() + date.getMinutes() / 60;
          if (hora >= 6 && hora < 9)        return "6:00 – 8:59 hs";
          if (hora >= 9 && hora < 15)       return "9:00 – 14:59 hs";
          if (hora >= 15 && hora < 18)      return "15:00 – 17:59 hs";
          if (hora >= 18 && hora <= 22)     return "18:00 – 22:00 hs";
          return "Fuera de horario";
        }

        function calcularPedido(skus, km, base) {
          return base + Math.max(0, skus - SKU_MINIMO) * POR_SKU + km * POR_KM;
        }

        function formatCLP(n) {
          return "$" + Math.round(n).toLocaleString("es-CL");
        }

        function getTodayKey() {
          return new Date().toISOString().slice(0, 10);
        }

        function getLunesKey(dateStr) {
          const d = new Date(dateStr + "T12:00:00");
          const day = d.getDay(); 
          const diff = day === 0 ? -6 : 1 - day;
          const lunes = new Date(d);
          lunes.setDate(d.getDate() + diff);
          return lunes.toISOString().slice(0, 10);
        }

        function getDomingoKey(lunesStr) {
          const d = new Date(lunesStr + "T12:00:00");
          d.setDate(d.getDate() + 6);
          return d.toISOString().slice(0, 10);
        }

        function formatFecha(dateStr) {
          const [y, m, d] = dateStr.split("-");
          return `${d}/${m}/${y}`;
        }

        const DIAS_NOMBRE = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
        const DIAS_FULL   = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];

        const TARIFAS = [
          ["6–8:59",   2600, 2700],
          ["9–14:59",  2400, 2500],
          ["15–17:59", 2400, 2500],
          ["18–22",    3100, 3300],
        ];

        function SubPedidoRow({ idx, data, onChange, onRemove, baseUsada, tramoColor, esUltimo }) {
          const skusN    = parseInt(data.skus) || 0;
          const kmN      = parseFloat(data.km) || 0;
          const retornoN = parseFloat(data.retorno) || 0;
          const kmTotal  = esUltimo ? kmN + retornoN : kmN;
          const tieneData = data.skus && (data.km !== "" || (esUltimo && data.retorno !== ""));
          const bruto = tieneData ? calcularPedido(skusN, kmTotal, baseUsada) : null;

          return (
            <div style={{ background:"rgba(255,255,255,0.04)", borderRadius:10, padding:"10px 12px", border:"1px solid rgba(251,191,36,0.15)", marginBottom:8 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:7 }}>
                <span style={{ fontSize:11, color:"#fbbf24", fontWeight:700 }}>
                  {idx === 0 ? `Pedido #1 · Base ${formatCLP(baseUsada)}` : `Pedido #${idx+1} · Base ${formatCLP(baseUsada)} (75%)`}
                  {esUltimo && <span style={{ color:"#a0aec0", fontWeight:400, marginLeft:5 }}>· último</span>}
                </span>
                {idx >= 2 && (
                  <button onClick={onRemove} style={{ background:"none", border:"none", color:"#fc8181", cursor:"pointer", fontSize:14 }}>✕</button>
                )}
              </div>
              <div style={{ display:"flex", gap:8, marginBottom: esUltimo ? 6 : 0 }}>
                <div style={{ flex:1 }}>
                  <label style={{ fontSize:10, color:"#a0aec0", display:"block", marginBottom:3 }}>SKUs</label>
                  <input type="number" value={data.skus} onChange={e => onChange("skus", e.target.value)}
                    placeholder="Ej: 10" step="1" min="0"
                    style={{ width:"100%", padding:"9px 10px", borderRadius:7, border:"1px solid #1f2937", background:"#0d1117", color:"#e2e8f0", fontSize:15, boxSizing:"border-box" }} />
                </div>
                {esUltimo ? (
                  <div style={{ flex:1, display:"flex", gap:5 }}>
                    <div style={{ flex:1 }}>
                      <label style={{ fontSize:10, color:"#a0aec0", display:"block", marginBottom:3 }}>Kilómetros</label>
                      <input type="number" value={data.km} onChange={e => onChange("km", e.target.value)}
                        placeholder="0" step="0.1" min="0"
                        style={{ width:"100%", padding:"9px 8px", borderRadius:7, border:"1px solid #1f2937", background:"#0d1117", color:"#e2e8f0", fontSize:14, boxSizing:"border-box" }} />
                    </div>
                    <div style={{ display:"flex", alignItems:"flex-end", paddingBottom:9, color:"#4a5568", fontSize:13 }}>+</div>
                    <div style={{ flex:1 }}>
                      <label style={{ fontSize:10, color:"#60a5fa", display:"block", marginBottom:3 }}>Retorno</label>
                      <input type="number" value={data.retorno || ""} onChange={e => onChange("retorno", e.target.value)}
                        placeholder="0" step="0.1" min="0"
                        style={{ width:"100%", padding:"9px 8px", borderRadius:7, border:"1px solid #1e3a5f", background:"#0a1628", color:"#90cdf4", fontSize:14, boxSizing:"border-box" }} />
                    </div>
                  </div>
                ) : (
                  <div style={{ flex:1 }}>
                    <label style={{ fontSize:10, color:"#a0aec0", display:"block", marginBottom:3 }}>Kilómetros</label>
                    <input type="number" value={data.km} onChange={e => onChange("km", e.target.value)}
                      placeholder="Ej: 2.5" step="0.1" min="0"
                      style={{ width:"100%", padding:"9px 10px", borderRadius:7, border:"1px solid #1f2937", background:"#0d1117", color:"#e2e8f0", fontSize:15, boxSizing:"border-box" }} />
                  </div>
                )}
              </div>
              {esUltimo && (kmN > 0 || retornoN > 0) && (
                <div style={{ fontSize:10, color:"#4a5568", marginBottom:4, textAlign:"right" }}>
                  km total: {kmN.toFixed(1)} + {retornoN.toFixed(1)} = <span style={{ color:"#90cdf4" }}>{kmTotal.toFixed(1)} km</span>
                </div>
              )}
              {bruto !== null && (
                <div style={{ marginTop:4, fontSize:11, color:"#718096", display:"flex", justifyContent:"space-between" }}>
                  <span>Bruto: {formatCLP(bruto)}</span>
                  <span style={{ fontWeight:700, color:tramoColor }}>Neto: {formatCLP(neto(bruto))}</span>
                </div>
              )}
            </div>
          );
        }

        function App() {
          const [pedidos, setPedidos]       = useState([]);
          const [skus, setSkus]             = useState("");
          const [km, setKm]                 = useState("");
          const [tab, setTab]               = useState("hoy");
          const [historial, setHistorial]   = useState({});
          const [msg, setMsg]               = useState("");
          const [ahora, setAhora]           = useState(new Date());
          const [showMulti, setShowMulti]   = useState(false);
          const [subPedidos, setSubPedidos] = useState([{ skus:"", km:"", retorno:"" }, { skus:"", km:"", retorno:"" }]);
          const [confirmDelete, setConfirmDelete] = useState(null); 
          const [confirmStep, setConfirmStep]     = useState(0);    
          const [semanasAbiertas, setSemanasAbiertas] = useState({});

          useEffect(() => {
            const t = setInterval(() => setAhora(new Date()), 60000);
            return () => clearInterval(t);
          }, []);

          useEffect(() => {
            try {
              const hist = JSON.parse(localStorage.getItem("zubale_hist") || "{}");
              setHistorial(hist);
              setPedidos(hist[getTodayKey()] || []);
            } catch {}
          }, []);

          useEffect(() => {
            try {
              const hoy = getTodayKey();
              const hist = JSON.parse(localStorage.getItem("zubale_hist") || "{}");
              hist[hoy] = pedidos;
              localStorage.setItem("zubale_hist", JSON.stringify(hist));
              setHistorial({ ...hist });
            } catch {}
          }, [pedidos]);

          const { base, esFinDeSemana } = getTarifaBase(ahora);
          const baseMulti = Math.round(base * MULTI_FACTOR);
          const tramo     = getTramoLabel(ahora);
          const horaLabel = ahora.toLocaleTimeString("es-CL", { hour:"2-digit", minute:"2-digit" });
          const diaLabel  = DIAS_NOMBRE[ahora.getDay()];
          const tramoColor = ahora.getHours() >= 18 ? "#f6c90e"
            : ahora.getHours() < 9 ? "#68d391" : "#90cdf4";

          const skusN = parseInt(skus) || 0;
          const kmN   = parseFloat(km) || 0;
          const preview = skus && km !== "" && !isNaN(kmN);

          const agregarPedido = () => {
            const s = parseInt(skus), k = parseFloat(km);
            if (!s || s < 1 || isNaN(k) || k < 0) {
              setMsg("⚠️ Ingresa SKUs y km válidos");
              setTimeout(() => setMsg(""), 2000); return;
            }
            const now = new Date();
            const { base: b } = getTarifaBase(now);
            const bruto = calcularPedido(s, k, b);
            setPedidos(p => [...p, {
              skus: s, km: k, total: neto(bruto), bruto, base: b, esMulti: false,
              hora: now.toLocaleTimeString("es-CL", { hour:"2-digit", minute:"2-digit" })
            }]);
            setSkus(""); setKm("");
            setMsg("✅ Pedido agregado");
            setTimeout(() => setMsg(""), 1500);
          };

          const updateSub = (i, field, val) =>
            setSubPedidos(prev => prev.map((p, idx) => idx === i ? { ...p, [field]: val } : p));
          const addSub    = () => setSubPedidos(prev => [...prev, { skus:"", km:"", retorno:"" }]);
          const removeSub = (i) => setSubPedidos(prev => prev.filter((_, idx) => idx !== i));

          const confirmarMultiorden = () => {
            const now = new Date();
            const { base: b } = getTarifaBase(now);
            const baseM = Math.round(b * MULTI_FACTOR);
            const hora  = now.toLocaleTimeString("es-CL", { hour:"2-digit", minute:"2-digit" });
            const nuevos = [];
            for (let i = 0; i < subPedidos.length; i++) {
              const s = parseInt(subPedidos[i].skus);
              const k = parseFloat(subPedidos[i].km) || 0;
              const r = parseFloat(subPedidos[i].retorno) || 0;
              const esUltimo = i === subPedidos.length - 1;
              const kmTotal = esUltimo ? k + r : k;
              if (!s || s < 1 || isNaN(kmTotal) || kmTotal < 0) {
                setMsg("⚠️ Completa todos los sub-pedidos");
                setTimeout(() => setMsg(""), 2500); return;
              }
              const baseUsada = i === 0 ? b : baseM;
              const bruto = calcularPedido(s, kmTotal, baseUsada);
              nuevos.push({
                skus: s, km: kmTotal, kmEntrega: k, retorno: esUltimo ? r : 0,
                total: neto(bruto), bruto, base: baseUsada,
                esMulti: true, multiIdx: i, hora
              });
            }
            setPedidos(p => [...p, ...nuevos]);
            setSubPedidos([{ skus:"", km:"", retorno:"" }, { skus:"", km:"", retorno:"" }]);
            setShowMulti(false);
            setMsg(`✅ Multiorden de ${nuevos.length} pedidos agregada`);
            setTimeout(() => setMsg(""), 2000);
          };

          const pedirEliminarDia = (dateStr) => {
            setConfirmDelete(dateStr);
            setConfirmStep(1);
          };
          const confirmarEliminar1 = () => setConfirmStep(2);
          const confirmarEliminar2 = () => {
            const hoy = getTodayKey();
            if (confirmDelete === hoy) {
              setPedidos([]);
            } else {
              const hist = { ...historial };
              delete hist[confirmDelete];
              localStorage.setItem("zubale_hist", JSON.stringify(hist));
              setHistorial(hist);
            }
            setConfirmDelete(null);
            setConfirmStep(0);
          };
          const cancelarEliminar = () => { setConfirmDelete(null); setConfirmStep(0); };

          const diasConPedidos = Object.keys(historial)
            .filter(d => (historial[d] || []).length > 0)
            .sort().reverse();

          const semanas = {};
          diasConPedidos.forEach(dia => {
            const lunes = getLunesKey(dia);
            if (!semanas[lunes]) semanas[lunes] = [];
            semanas[lunes].push(dia);
          });
          const semanasKeys = Object.keys(semanas).sort().reverse();

          const toggleSemana = (lunes) =>
            setSemanasAbiertas(prev => ({ ...prev, [lunes]: !prev[lunes] }));

          const totalDia  = pedidos.reduce((a, p) => a + p.total, 0);
          const brutoDia  = pedidos.reduce((a, p) => a + (p.bruto || p.total), 0);

          const multiTotBruto = subPedidos.reduce((acc, sp, i) => {
            const s = parseInt(sp.skus) || 0;
            const k = parseFloat(sp.km) || 0;
            const r = parseFloat(sp.retorno) || 0;
            const esUltimo = i === subPedidos.length - 1;
            const kmTotal = esUltimo ? k + r : k;
            if (!s) return acc;
            return acc + calcularPedido(s, kmTotal, i === 0 ? base : baseMulti);
          }, 0);

          return (
            <div style={{ minHeight:"100vh", background:"linear-gradient(160deg,#08101a 0%,#0d1b2e 60%,#111827 100%)", fontFamily:"'Segoe UI',sans-serif", color:"#e2e8f0", paddingBottom:70 }}>
              <div style={{ background:"linear-gradient(90deg,#004e8c,#0096c7)", padding:"16px 18px 12px", boxShadow:"0 4px 20px rgba(0,150,199,0.3)" }}>
                <div style={{ fontSize:20, fontWeight:800, display:"flex", alignItems:"center", gap:8 }}>
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
                  ControlZ
                </div>
                <div style={{ fontSize:11, opacity:0.75, marginTop:1 }}>Sala 127 · Linares · Líder</div>
              </div>

              <div style={{ margin:"12px 14px 0", background:"rgba(255,255,255,0.04)", borderRadius:14, padding:"12px 14px", border:`1px solid ${tramoColor}33`, display:"flex", justifyContent:"space-between", alignItems:"center", gap:10 }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:9, color:"#718096", letterSpacing:1, marginBottom:3 }}>TARIFA ACTIVA · {diaLabel} {horaLabel}</div>
                  <div style={{ fontSize:11, color:tramoColor, marginBottom:2 }}>{tramo}</div>
                  <div style={{ fontSize:24, fontWeight:800, color:tramoColor, lineHeight:1 }}>{formatCLP(base)}</div>
                  <div style={{ fontSize:10, color:"#4a5568", marginTop:3 }}>
                    {esFinDeSemana ? "🗓 Sáb / Dom" : "🗓 Lun – Vie"}&nbsp;·&nbsp;
                    <span style={{ color:"#fbbf24" }}>Multiorden: {formatCLP(baseMulti)}</span>
                  </div>
                </div>
                <div style={{ background:"rgba(0,0,0,0.3)", borderRadius:10, padding:"8px 10px", fontSize:9.5, lineHeight:1.9, border:"1px solid rgba(255,255,255,0.06)", flexShrink:0 }}>
                  <div style={{ fontWeight:700, color:"#a0aec0", marginBottom:2, display:"flex", gap:8 }}>
                    <span style={{ width:50 }}>Horario</span>
                    <span style={{ width:34, textAlign:"right" }}>L-V</span>
                    <span style={{ width:34, textAlign:"right" }}>S-D</span>
                  </div>
                  {TARIFAS.map(([h, lv, sd]) => {
                    const esActivo = (base === (esFinDeSemana ? sd : lv)) && tramo.startsWith(h.split("–")[0]);
                    return (
                      <div key={h} style={{ display:"flex", gap:8, color: esActivo ? tramoColor : "#374151", fontWeight: esActivo ? 700 : 400 }}>
                        <span style={{ width:50 }}>{h}</span>
                        <span style={{ width:34, textAlign:"right" }}>${(lv/1000).toFixed(1)}k</span>
                        <span style={{ width:34, textAlign:"right" }}>${(sd/1000).toFixed(1)}k</span>
                      </div>
                    );
                  })}
                </div>
              </div>

              {tab === "hoy" && (
                <div style={{ padding:"14px" }}>
                  <div style={{ background:"rgba(255,255,255,0.04)", borderRadius:14, padding:"14px", marginBottom:14, border:"1px solid rgba(0,150,199,0.18)" }}>
                    <div style={{ fontSize:11, fontWeight:700, marginBottom:10, color:"#0096c7", letterSpacing:1 }}>NUEVO PEDIDO</div>
                    <div style={{ display:"flex", gap:10, marginBottom:10 }}>
                      {[["SKUs", skus, setSkus, "Ej: 12", "1"], ["Kilómetros", km, setKm, "Ej: 3.5", "0.1"]].map(([label, val, set, ph, step]) => (
                        <div key={label} style={{ flex:1 }}>
                          <label style={{ fontSize:10, color:"#a0aec0", display:"block", marginBottom:4 }}>{label}</label>
                          <input type="number" value={val} onChange={e => set(e.target.value)} placeholder={ph} step={step}
                            style={{ width:"100%", padding:"10px 12px", borderRadius:8, border:"1px solid #1f2937", background:"#0d1117", color:"#e2e8f0", fontSize:16, boxSizing:"border-box" }} />
                        </div>
                      ))}
                    </div>

                    {preview && (
                      <div style={{ background:"rgba(0,150,199,0.07)", borderRadius:8, padding:"10px 12px", marginBottom:10, fontSize:11, color:"#90cdf4", border:"1px solid rgba(0,150,199,0.18)", lineHeight:1.8 }}>
                        <span style={{ color:"#4a5568" }}>Base</span> {formatCLP(base)} + <span style={{ color:"#4a5568" }}>SKUs</span> {Math.max(0,skusN-5)}×$100={formatCLP(Math.max(0,skusN-5)*100)} + <span style={{ color:"#4a5568" }}>km</span> {formatCLP(kmN*POR_KM)}
                        <div style={{ fontSize:10, color:"#4a5568", marginTop:3 }}>Bruto: {formatCLP(calcularPedido(skusN,kmN,base))} − 15.25%</div>
                        <div style={{ fontWeight:800, color:tramoColor, fontSize:17, marginTop:2 }}>Neto: {formatCLP(neto(calcularPedido(skusN,kmN,base)))}</div>
                      </div>
                    )}

                    {msg && <div style={{ fontSize:12, marginBottom:8, color: msg.includes("⚠️") ? "#fc8181":"#68d391" }}>{msg}</div>}

                    <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                      <button onClick={agregarPedido} style={{ width:"100%", padding:"13px", borderRadius:10, background:"linear-gradient(90deg,#0096c7,#004e8c)", border:"none", color:"white", fontWeight:700, fontSize:15, cursor:"pointer" }}>
                        + Agregar Pedido
                      </button>
                      <button onClick={() => setShowMulti(true)} style={{ width:"100%", padding:"12px", borderRadius:10, background:"linear-gradient(90deg,#78350f,#d97706)", border:"1px solid #fbbf2433", color:"white", fontWeight:700, fontSize:14, cursor:"pointer" }}>
                        🔀 Multiorden <span style={{ fontSize:11, fontWeight:400, opacity:0.8 }}>(2° en adelante: {formatCLP(baseMulti)})</span>
                      </button>
                    </div>
                  </div>

                  <div style={{ background:"rgba(0,150,199,0.08)", borderRadius:14, padding:"12px 16px", marginBottom:14, border:"1px solid rgba(0,150,199,0.2)" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                      <div style={{ fontSize:9, color:"#4a5568", letterSpacing:1 }}>PEDIDOS HOY</div>
                      <div style={{ fontSize:22, fontWeight:800, color:"#68d391" }}>{pedidos.length}</div>
                    </div>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end" }}>
                      <div>
                        <div style={{ fontSize:9, color:"#4a5568", letterSpacing:1 }}>BRUTO</div>
                        <div style={{ fontSize:15, fontWeight:600, color:"#4a5568", textDecoration:"line-through" }}>{formatCLP(brutoDia)}</div>
                      </div>
                      <div style={{ textAlign:"right" }}>
                        <div style={{ fontSize:9, color:"#4a5568", letterSpacing:1 }}>NETO (−15.25%)</div>
                        <div style={{ fontSize:26, fontWeight:800, color:"#00e5ff" }}>{formatCLP(totalDia)}</div>
                      </div>
                    </div>
                  </div>

                  {pedidos.length === 0 ? (
                    <div style={{ textAlign:"center", color:"#1f2937", padding:"28px 0", fontSize:13 }}>No hay pedidos aún hoy.</div>
                  ) : (
                    <>
                      <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:12 }}>
                        {pedidos.map((p, i) => (
                          <div key={i} style={{ background: p.esMulti ? "rgba(251,191,36,0.05)" : "rgba(255,255,255,0.03)", borderRadius:10, padding:"11px 13px", display:"flex", justifyContent:"space-between", alignItems:"center", border: p.esMulti ? "1px solid rgba(251,191,36,0.18)" : "1px solid rgba(255,255,255,0.05)" }}>
                            <div>
                              <div style={{ fontSize:11, color:"#4a5568" }}>
                                🕐 {p.hora} · {p.skus} SKUs · {p.km} km · base {formatCLP(p.base)}
                                {p.esMulti && <span style={{ color:"#fbbf24", marginLeft:5 }}>🔀 {p.multiIdx === 0 ? "Multi #1" : `Multi #${p.multiIdx+1}`}</span>}
                              </div>
                              <div style={{ fontSize:11, color:"#374151", marginTop:1 }}>Bruto: {formatCLP(p.bruto)} − 15.25%</div>
                              <div style={{ fontSize:17, fontWeight:700, color:"#e2e8f0", marginTop:1 }}>Neto: {formatCLP(p.total)}</div>
                            </div>
                            <button onClick={() => setPedidos(prev => prev.filter((_,idx)=>idx!==i))}
                              style={{ background:"rgba(252,129,129,0.08)", border:"1px solid rgba(252,129,129,0.2)", color:"#fc8181", borderRadius:8, padding:"6px 10px", cursor:"pointer", fontSize:15 }}>✕</button>
                          </div>
                        ))}
                      </div>
                      <button onClick={() => pedirEliminarDia(getTodayKey())}
                        style={{ width:"100%", padding:"11px", borderRadius:10, background:"rgba(252,129,129,0.07)", border:"1px solid rgba(252,129,129,0.25)", color:"#fc8181", fontWeight:600, fontSize:13, cursor:"pointer" }}>
                        🗑 Borrar todos los pedidos de hoy
                      </button>
                    </>
                  )}
                </div>
              )}

              {tab === "historial" && (
                <div style={{ padding:"14px" }}>
                  {semanasKeys.length === 0 ? (
                    <div style={{ textAlign:"center", color:"#1f2937", padding:"40px 0", fontSize:13 }}>Aún no hay historial.</div>
                  ) : semanasKeys.map(lunes => {
                    const domingo    = getDomingoKey(lunes);
                    const diasSemana = semanas[lunes];
                    const abierta    = semanasAbiertas[lunes] !== false; 
                    const totalSemBruto = diasSemana.reduce((acc, dia) =>
                      acc + (historial[dia] || []).reduce((a,p) => a+(p.bruto||p.total), 0), 0);
                    const totalSemNeto  = diasSemana.reduce((acc, dia) =>
                      acc + (historial[dia] || []).reduce((a,p) => a+p.total, 0), 0);
                    const totalPedidos  = diasSemana.reduce((acc, dia) =>
                      acc + (historial[dia] || []).length, 0);

                    return (
                      <div key={lunes} style={{ marginBottom:14 }}>
                        <button onClick={() => toggleSemana(lunes)} style={{ width:"100%", background:"linear-gradient(90deg,rgba(0,150,199,0.12),rgba(0,86,160,0.08))", border:"1px solid rgba(0,150,199,0.25)", borderRadius:12, padding:"12px 14px", cursor:"pointer", textAlign:"left", color:"#e2e8f0" }}>
                          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                            <div>
                              <div style={{ fontSize:12, fontWeight:700, color:"#0096c7" }}>
                                {abierta ? "▾" : "▸"} Semana {formatFecha(lunes)} – {formatFecha(domingo)}
                              </div>
                              <div style={{ fontSize:10, color:"#4a5568", marginTop:2 }}>{totalPedidos} pedidos · {diasSemana.length} días trabajados</div>
                            </div>
                            <div style={{ textAlign:"right" }}>
                              <div style={{ fontSize:10, color:"#4a5568", textDecoration:"line-through" }}>{formatCLP(totalSemBruto)}</div>
                              <div style={{ fontSize:17, fontWeight:800, color:"#00e5ff" }}>{formatCLP(totalSemNeto)}</div>
                              <div style={{ fontSize:9, color:"#4a5568" }}>neto semana</div>
                            </div>
                          </div>
                        </button>
                        {abierta && (
                          <div style={{ marginTop:6, paddingLeft:8, borderLeft:"2px solid rgba(0,150,199,0.2)" }}>
                            {diasSemana.map(dia => {
                              const pd   = historial[dia] || [];
                              const tot  = pd.reduce((a,p) => a+p.total, 0);
                              const brut = pd.reduce((a,p) => a+(p.bruto||p.total), 0);
                              const fechaObj = new Date(dia + "T12:00:00");
                              const diaNombre = DIAS_FULL[fechaObj.getDay()];

                              return (
                                <div key={dia} style={{ background:"rgba(255,255,255,0.03)", borderRadius:10, padding:"11px 13px", marginBottom:7, border:"1px solid rgba(255,255,255,0.05)" }}>
                                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:5 }}>
                                    <div>
                                      <div style={{ fontWeight:700, color:"#a0aec0", fontSize:12 }}>{diaNombre} {formatFecha(dia)}</div>
                                      <div style={{ fontSize:10, color:"#4a5568", marginTop:1 }}>{pd.length} pedidos · Prom: {formatCLP(tot/pd.length)}</div>
                                    </div>
                                    <div style={{ textAlign:"right" }}>
                                      <div style={{ fontSize:10, color:"#374151", textDecoration:"line-through" }}>{formatCLP(brut)}</div>
                                      <div style={{ fontSize:14, fontWeight:700, color:"#68d391" }}>{formatCLP(tot)}</div>
                                    </div>
                                  </div>
                                  <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginBottom:8 }}>
                                    {pd.map((p, i) => (
                                      <div key={i} style={{ background: p.esMulti ? "rgba(251,191,36,0.07)" : "rgba(0,150,199,0.07)", borderRadius:5, padding:"3px 7px", fontSize:9.5, color: p.esMulti ? "#fbbf24":"#90cdf4", border:`1px solid ${p.esMulti?"rgba(251,191,36,0.15)":"rgba(0,150,199,0.13)"}` }}>
                                        {p.esMulti ? "🔀" : "#"}{i+1} · {p.skus}SKU · {p.retorno > 0 ? `${p.kmEntrega}+${p.retorno}km` : `${p.km}km`} · {formatCLP(p.total)}
                                      </div>
                                    ))}
                                  </div>
                                  <button onClick={() => pedirEliminarDia(dia)}
                                    style={{ width:"100%", padding:"7px", borderRadius:7, background:"rgba(252,129,129,0.05)", border:"1px solid rgba(252,129,129,0.18)", color:"#fc8181", fontSize:11, fontWeight:600, cursor:"pointer" }}>
                                    🗑 Borrar pedidos del {formatFecha(dia)}
                                  </button>
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}

              <div style={{ position:"fixed", bottom:0, left:0, right:0, background:"#0a0f1a", borderTop:"1px solid #1a2535", display:"flex", zIndex:50 }}>
                {[["hoy","📦","Hoy"],["historial","📅","Historial"]].map(([t, icon, label]) => (
                  <button key={t} onClick={() => setTab(t)} style={{ flex:1, padding:"10px 0 14px", background:"none", border:"none", borderTop: tab===t ? `3px solid ${tramoColor}` : "3px solid transparent", color: tab===t ? tramoColor : "#374151", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>
                    <span style={{ fontSize:20 }}>{icon}</span>
                    <span style={{ fontSize:10, fontWeight: tab===t ? 700 : 400 }}>{label}</span>
                  </button>
                ))}
              </div>

              {showMulti && (
                <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:100, display:"flex", alignItems:"flex-end" }}>
                  <div style={{ background:"#0d1b2e", width:"100%", borderRadius:"20px 20px 0 0", padding:"20px 16px 32px", maxHeight:"90vh", overflowY:"auto", border:"1px solid rgba(251,191,36,0.2)" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                      <div>
                        <div style={{ fontSize:15, fontWeight:800, color:"#fbbf24" }}>🔀 Multiorden</div>
                        <div style={{ fontSize:10, color:"#4a5568", marginTop:2 }}>
                          #1: base {formatCLP(base)} &nbsp;·&nbsp; #2+: base {formatCLP(baseMulti)} (75%)
                        </div>
                      </div>
                      <button onClick={() => setShowMulti(false)} style={{ background:"rgba(255,255,255,0.06)", border:"none", color:"#a0aec0", borderRadius:8, padding:"6px 12px", cursor:"pointer", fontSize:13 }}>Cancelar</button>
                    </div>
                    {subPedidos.map((sp, i) => (
                      <SubPedidoRow key={i} idx={i} data={sp}
                        onChange={(field, val) => updateSub(i, field, val)}
                        onRemove={() => removeSub(i)}
                        baseUsada={i === 0 ? base : baseMulti}
                        tramoColor={i === 0 ? tramoColor : "#fbbf24"}
                        esUltimo={i === subPedidos.length - 1} />
                    ))}
                    <button onClick={addSub} style={{ width:"100%", padding:"10px", borderRadius:9, background:"rgba(251,191,36,0.08)", border:"1px dashed rgba(251,191,36,0.35)", color:"#fbbf24", fontWeight:600, fontSize:13, cursor:"pointer", marginBottom:12 }}>
                      + Agregar otro pedido a la multiorden
                    </button>
                    {multiTotBruto > 0 && (
                      <div style={{ background:"rgba(251,191,36,0.07)", borderRadius:10, padding:"10px 12px", marginBottom:12, border:"1px solid rgba(251,191,36,0.2)" }}>
                        <div style={{ display:"flex", justifyContent:"space-between", fontSize:11 }}>
                          <span style={{ color:"#4a5568" }}>Total bruto</span>
                          <span style={{ color:"#718096", textDecoration:"line-through" }}>{formatCLP(multiTotBruto)}</span>
                        </div>
                        <div style={{ display:"flex", justifyContent:"space-between", marginTop:4 }}>
                          <span style={{ fontSize:11, color:"#4a5568" }}>Total neto (−15.25%)</span>
                          <span style={{ fontSize:18, fontWeight:800, color:"#fbbf24" }}>{formatCLP(neto(multiTotBruto))}</span>
                        </div>
                      </div>
                    )}
                    {msg && <div style={{ fontSize:12, marginBottom:8, color:"#fc8181" }}>{msg}</div>}
                    <button onClick={confirmarMultiorden} style={{ width:"100%", padding:"14px", borderRadius:11, background:"linear-gradient(90deg,#92400e,#d97706)", border:"none", color:"white", fontWeight:700, fontSize:15, cursor:"pointer" }}>
                      ✅ Confirmar Multiorden ({subPedidos.length} pedidos)
                    </button>
                  </div>
                </div>
              )}

              {confirmDelete && (
                <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.8)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
                  <div style={{ background:"#0d1b2e", borderRadius:16, padding:"24px 20px", border:"1px solid rgba(252,129,129,0.3)", maxWidth:340, width:"100%" }}>
                    {confirmStep === 1 && (
                      <>
                        <div style={{ fontSize:28, textAlign:"center", marginBottom:10 }}>🗑</div>
                        <div style={{ fontWeight:700, fontSize:15, textAlign:"center", marginBottom:6 }}>¿Borrar pedidos del {formatFecha(confirmDelete)}?</div>
                        <div style={{ fontSize:12, color:"#718096", textAlign:"center", marginBottom:20 }}>
                          Se eliminarán {(historial[confirmDelete] || pedidos).length} pedidos. Esta acción no se puede deshacer.
                        </div>
                        <div style={{ display:"flex", gap:10 }}>
                          <button onClick={cancelarEliminar} style={{ flex:1, padding:"11px", borderRadius:9, background:"rgba(255,255,255,0.05)", border:"1px solid #1f2937", color:"#a0aec0", fontWeight:600, cursor:"pointer" }}>Cancelar</button>
                          <button onClick={confirmarEliminar1} style={{ flex:1, padding:"11px", borderRadius:9, background:"rgba(252,129,129,0.12)", border:"1px solid rgba(252,129,129,0.3)", color:"#fc8181", fontWeight:700, cursor:"pointer" }}>Sí, borrar</button>
                        </div>
                      </>
                    )}
                    {confirmStep === 2 && (
                      <>
                        <div style={{ fontSize:28, textAlign:"center", marginBottom:10 }}>⚠️</div>
                        <div style={{ fontWeight:800, fontSize:15, textAlign:"center", color:"#fc8181", marginBottom:6 }}>¿Estás seguro?</div>
                        <div style={{ fontSize:12, color:"#718096", textAlign:"center", marginBottom:20 }}>
                          Esta es tu segunda confirmación. Los pedidos del <strong style={{ color:"#e2e8f0" }}>{formatFecha(confirmDelete)}</strong> se borrarán permanentemente.
                        </div>
                        <div style={{ display:"flex", gap:10 }}>
                          <button onClick={cancelarEliminar} style={{ flex:1, padding:"11px", borderRadius:9, background:"rgba(255,255,255,0.05)", border:"1px solid #1f2937", color:"#a0aec0", fontWeight:600, cursor:"pointer" }}>Cancelar</button>
                          <button onClick={confirmarEliminar2} style={{ flex:1, padding:"11px", borderRadius:9, background:"linear-gradient(90deg,#7f1d1d,#dc2626)", border:"none", color:"white", fontWeight:700, cursor:"pointer" }}>🗑 Borrar definitivamente</button>
                        </div>
                      </>
                    )}
                  </div>
                </div>
              )}

              <div style={{ textAlign:"center", padding:"8px 14px 4px", fontSize:9, color:"#111827" }}>
                SKU $100 (desde el 6°) · Km $257 · Impuesto 15.25% · Multiorden base ×75%
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
